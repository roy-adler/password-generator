<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Online Password Generator | Create Secure Random Passwords</title>
  <meta name="description" content="Generate strong, random passwords instantly. Free secure password generator with length control, uppercase, lowercase, numbers & symbols. No data stored. Create passwords in your browser.">
  <meta name="keywords" content="password generator, secure password, random password, strong password, free password generator, online password generator">
  <meta name="author" content="Password Generator">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://password-generator.royadler.de/">
  <link rel="icon" href="password_generator_logo.png" type="image/png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Free Online Password Generator | Create Secure Random Passwords">
  <meta property="og:description" content="Generate strong, random passwords instantly. Free secure password generator with length control. No data stored.">
  <meta property="og:url" content=https://password-generator.royadler.de/">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Free Online Password Generator">
  <meta name="twitter:description" content="Generate strong, random passwords instantly. Free, secure, no data stored.">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Password Generator",
    "description": "Generate strong, random passwords instantly. Free secure password generator with customizable length and character options.",
    "applicationCategory": "UtilitiesApplication",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "browserRequirements": "Requires JavaScript. Works in modern browsers."
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container" role="main">
    <header>
      <h1>Password Generator</h1>
      <p class="subtitle">Create secure, random passwords instantly</p>
    </header>

    <div class="password-display">
      <input 
        type="text" 
        class="password-field" 
        id="password" 
        readonly 
        placeholder="Click Generate to create a password"
        aria-label="Generated password"
      >
      <button class="btn btn-primary" id="generateBtn" type="button">Generate</button>
    </div>

    <button class="btn btn-secondary btn-copy" id="copyBtn" type="button">Copy password</button>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill" style="width: 0%"></div>
    </div>
    <p class="strength-label" id="strengthLabel">—</p>

    <div class="settings">
      <div class="setting-row">
        <span class="setting-label">Password length</span>
        <span class="length-value" id="lengthValue">12</span>
      </div>
      <input type="range" id="lengthSlider" min="8" max="64" value="12">

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked>
          Uppercase letters
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked>
          Lowercase letters
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked>
          Numbers
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="symbols" checked>
          Special characters
        </label>
      </div>
    </div>
  </main>

  <script>
    const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
    const NUMBERS = '0123456789';
    const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    const passwordInput = document.getElementById('password');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    function getCharacterSet() {
      let charset = '';
      if (document.getElementById('uppercase').checked) charset += UPPERCASE;
      if (document.getElementById('lowercase').checked) charset += LOWERCASE;
      if (document.getElementById('numbers').checked) charset += NUMBERS;
      if (document.getElementById('symbols').checked) charset += SYMBOLS;
      return charset;
    }

    function generatePassword() {
      const charset = getCharacterSet();
      if (!charset) {
        passwordInput.value = '';
        updateStrength('');
        return;
      }

      const length = parseInt(lengthSlider.value, 10);
      const randomValues = new Uint32Array(length);
      crypto.getRandomValues(randomValues);

      let password = '';
      for (let i = 0; i < length; i++) {
        password += charset[randomValues[i] % charset.length];
      }

      passwordInput.value = password;
      updateStrength(password);
    }

    function calculateStrength(password) {
      if (!password) return { score: 0, label: '—' };

      let entropy = 0;
      let charsetSize = 0;
      if (/[a-z]/.test(password)) charsetSize += 26;
      if (/[A-Z]/.test(password)) charsetSize += 26;
      if (/[0-9]/.test(password)) charsetSize += 10;
      if (/[^a-zA-Z0-9]/.test(password)) charsetSize += 32;
      if (charsetSize === 0) charsetSize = 1;

      entropy = password.length * Math.log2(charsetSize);

      if (entropy < 28) return { score: 0.33, label: 'Weak' };
      if (entropy < 44) return { score: 0.66, label: 'Average' };
      return { score: 1, label: 'Strong' };
    }

    function updateStrength(password) {
      const { score, label } = calculateStrength(password);
      strengthFill.style.width = `${score * 100}%`;
      strengthFill.className = 'strength-fill ' + 
        (score < 0.5 ? 'weak' : score < 0.85 ? 'average' : 'strong');
      strengthLabel.textContent = label;
    }

    async function copyPassword() {
      const password = passwordInput.value;
      if (!password) return;

      try {
        await navigator.clipboard.writeText(password);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy password';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        passwordInput.select();
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy password';
          copyBtn.classList.remove('copied');
        }, 2000);
      }
    }

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
      if (passwordInput.value) {
        generatePassword();
      }
    });

    ['uppercase', 'lowercase', 'numbers', 'symbols'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        if (passwordInput.value) {
          generatePassword();
        }
      });
    });

    generateBtn.addEventListener('click', generatePassword);
    copyBtn.addEventListener('click', copyPassword);

    lengthValue.textContent = lengthSlider.value;
    generatePassword();
  </script>
</body>
</html>
