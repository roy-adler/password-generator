  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --weak: #f85149;
      --average: #d29922;
      --strong: #3fb950;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88, 166, 255, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(63, 185, 80, 0.05), transparent);
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .password-display {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .password-field {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      padding: 0.875rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      letter-spacing: 0.05em;
    }

    .password-field::placeholder {
      color: var(--text-secondary);
    }

    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.875rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-copy {
      min-width: 100px;
    }

    .btn-copy.copied {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }

    .strength-bar {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .strength-fill.weak { background: var(--weak); }
    .strength-fill.average { background: var(--average); }
    .strength-fill.strong { background: var(--strong); }

    .strength-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .setting-label {
      font-size: 0.95rem;
    }

    .length-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent);
      min-width: 2ch;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--bg-tertiary);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      font-size: 0.95rem;
      user-select: none;
    }

    .checkbox-label input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <header>
      <h1>Password Generator</h1>
      <p class="subtitle">Create secure, random passwords instantly</p>
    </header>

    <div class="password-display">
      <input 
        type="text" 
        class="password-field" 
        id="password" 
        readonly 
        placeholder="Click Generate to create a password"
        aria-label="Generated password"
      >
      <button class="btn btn-primary" id="generateBtn" type="button">Generate</button>
    </div>

    <button class="btn btn-secondary btn-copy" id="copyBtn" type="button">Copy password</button>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill" style="width: 0%"></div>
    </div>
    <p class="strength-label" id="strengthLabel">—</p>

    <div class="settings">
      <div class="setting-row">
        <span class="setting-label">Password length</span>
        <span class="length-value" id="lengthValue">12</span>
      </div>
      <input type="range" id="lengthSlider" min="8" max="64" value="12">

      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="uppercase" checked>
          Uppercase letters
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="lowercase" checked>
          Lowercase letters
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="numbers" checked>
          Numbers
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="symbols" checked>
          Special characters
        </label>
      </div>
    </div>
  </main>

  <script>
    const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
    const NUMBERS = '0123456789';
    const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    const passwordInput = document.getElementById('password');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');

    function getCharacterSet() {
      let charset = '';
      if (document.getElementById('uppercase').checked) charset += UPPERCASE;
      if (document.getElementById('lowercase').checked) charset += LOWERCASE;
      if (document.getElementById('numbers').checked) charset += NUMBERS;
      if (document.getElementById('symbols').checked) charset += SYMBOLS;
      return charset;
    }

    function generatePassword() {
      const charset = getCharacterSet();
      if (!charset) {
        passwordInput.value = '';
        updateStrength('');
        return;
      }

      const length = parseInt(lengthSlider.value, 10);
      const randomValues = new Uint32Array(length);
      crypto.getRandomValues(randomValues);

      let password = '';
      for (let i = 0; i < length; i++) {
        password += charset[randomValues[i] % charset.length];
      }

      passwordInput.value = password;
      updateStrength(password);
    }

    function calculateStrength(password) {
      if (!password) return { score: 0, label: '—' };

      let entropy = 0;
      let charsetSize = 0;
      if (/[a-z]/.test(password)) charsetSize += 26;
      if (/[A-Z]/.test(password)) charsetSize += 26;
      if (/[0-9]/.test(password)) charsetSize += 10;
      if (/[^a-zA-Z0-9]/.test(password)) charsetSize += 32;
      if (charsetSize === 0) charsetSize = 1;

      entropy = password.length * Math.log2(charsetSize);

      if (entropy < 28) return { score: 0.33, label: 'Weak' };
      if (entropy < 44) return { score: 0.66, label: 'Average' };
      return { score: 1, label: 'Strong' };
    }

    function updateStrength(password) {
      const { score, label } = calculateStrength(password);
      strengthFill.style.width = `${score * 100}%`;
      strengthFill.className = 'strength-fill ' + 
        (score < 0.5 ? 'weak' : score < 0.85 ? 'average' : 'strong');
      strengthLabel.textContent = label;
    }

    async function copyPassword() {
      const password = passwordInput.value;
      if (!password) return;

      try {
        await navigator.clipboard.writeText(password);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy password';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        passwordInput.select();
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy password';
          copyBtn.classList.remove('copied');
        }, 2000);
      }
    }

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
      if (passwordInput.value) {
        generatePassword();
      }
    });

    ['uppercase', 'lowercase', 'numbers', 'symbols'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        if (passwordInput.value) {
          generatePassword();
        }
      });
    });

    generateBtn.addEventListener('click', generatePassword);
    copyBtn.addEventListener('click', copyPassword);

    lengthValue.textContent = lengthSlider.value;
    generatePassword();
  </script>
</body>
</html>
